<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cougar Court Challenge</title>

<style>
    :root {
        --navy: #07172d;
        --blue: #0057b8;
        --electric: #16a4ff;
        --gold: #f5b642;
        --orange: #ef7d22;
        --paint: #123d73;
        --white: #ffffff;
        --glass: rgba(255, 255, 255, 0.12);
        --line: rgba(255, 255, 255, 0.7);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--white);
        background:
            radial-gradient(circle at top left, rgba(22, 164, 255, 0.28), transparent 30rem),
            linear-gradient(135deg, #041020 0%, #082a55 48%, #101827 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
    }

    .page-links {
        position: fixed;
        top: 14px;
        right: 18px;
        z-index: 10;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(4, 16, 32, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 0.9rem;
        font-weight: 700;
    }

    .page-links a {
        color: var(--white);
        text-decoration: none;
    }

    .page-links a:hover {
        color: var(--gold);
    }

    .game-shell {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 22px;
        align-items: stretch;
    }

    .arena {
        position: relative;
        min-height: 560px;
        border: 2px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        overflow: hidden;
        background:
            linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
            linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
            linear-gradient(160deg, #0b3564, #0067c7 54%, #08315d);
        background-size: 42px 42px, 42px 42px, auto;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .top-bar {
        position: absolute;
        z-index: 5;
        top: 18px;
        left: 18px;
        right: 18px;
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
    }

    h1 {
        margin: 0;
        font-size: clamp(1.7rem, 4vw, 3rem);
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0;
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
    }

    .badge {
        color: var(--navy);
        background: var(--gold);
        border-radius: 4px;
        padding: 7px 10px;
        font-weight: 800;
        font-size: 0.8rem;
        white-space: nowrap;
    }

    .court {
        position: absolute;
        inset: 82px 22px 20px;
        border: 4px solid var(--line);
        border-radius: 8px;
        background:
            radial-gradient(ellipse at center 102%, transparent 0 25%, var(--line) 25.2% 25.8%, transparent 26%),
            linear-gradient(90deg, transparent 0 calc(50% - 2px), var(--line) calc(50% - 2px) calc(50% + 2px), transparent calc(50% + 2px)),
            linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    }

    .paint {
        position: absolute;
        left: 50%;
        top: 0;
        width: min(54%, 360px);
        height: 190px;
        transform: translateX(-50%);
        border: 4px solid var(--line);
        border-top: 0;
        background: rgba(3, 20, 45, 0.28);
    }

    .free-throw {
        position: absolute;
        left: 50%;
        top: 140px;
        width: 180px;
        height: 90px;
        transform: translateX(-50%);
        border: 4px solid var(--line);
        border-top: 0;
        border-radius: 0 0 100px 100px;
    }

    .backboard {
        position: absolute;
        left: 50%;
        top: 34px;
        width: 174px;
        height: 12px;
        transform: translateX(-50%);
        background: var(--white);
        border-radius: 3px;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }

    .rim {
        position: absolute;
        left: 50%;
        top: 55px;
        width: 112px;
        height: 26px;
        transform: translateX(-50%);
        border: 6px solid var(--orange);
        border-top: 0;
        border-radius: 0 0 80px 80px;
        filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.35));
    }

    .target {
        position: absolute;
        top: 46px;
        left: 50%;
        width: 54px;
        height: 54px;
        transform: translateX(-50%);
        border: 3px solid var(--gold);
        border-radius: 50%;
        box-shadow: 0 0 22px rgba(245, 182, 66, 0.7);
        pointer-events: none;
    }

    .ball {
        position: absolute;
        left: 50%;
        bottom: 36px;
        width: 58px;
        height: 58px;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
            radial-gradient(circle at 30% 24%, #ffbd6f 0 12%, transparent 13%),
            radial-gradient(circle, #f28a24 0 58%, #c85d13 100%);
        border: 2px solid #742c0a;
        box-shadow: 0 14px 26px rgba(0, 0, 0, 0.45);
        transition: left 0.56s cubic-bezier(.2,.8,.2,1), bottom 0.56s cubic-bezier(.2,.8,.2,1), transform 0.56s;
        z-index: 3;
    }

    .ball::before,
    .ball::after {
        content: "";
        position: absolute;
        inset: 7px;
        border: 3px solid rgba(80, 30, 8, 0.72);
        border-left: 0;
        border-right: 0;
        border-radius: 50%;
    }

    .ball::after {
        inset: 0 23px;
        border: 0;
        border-left: 3px solid rgba(80, 30, 8, 0.72);
        border-right: 3px solid rgba(80, 30, 8, 0.72);
    }

    .shot-feedback {
        position: absolute;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%) scale(0.9);
        font-size: clamp(2.2rem, 8vw, 5rem);
        font-weight: 900;
        color: var(--gold);
        opacity: 0;
        text-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
        pointer-events: none;
        z-index: 4;
    }

    .shot-feedback.show {
        animation: pop 0.72s ease;
    }

    .panel {
        border-radius: 8px;
        background: rgba(4, 16, 32, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .stat {
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        padding: 10px;
    }

    .stat span {
        display: block;
        color: #b8d7ff;
        font-size: 0.72rem;
        text-transform: uppercase;
        font-weight: 700;
    }

    .stat strong {
        display: block;
        margin-top: 3px;
        font-size: 1.45rem;
        line-height: 1;
    }

    .meter-wrap {
        padding: 12px;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
    }

    .meter-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: #d8eaff;
        font-weight: 700;
        font-size: 0.82rem;
        text-transform: uppercase;
    }

    .meter {
        position: relative;
        height: 18px;
        border-radius: 999px;
        overflow: hidden;
        background: linear-gradient(90deg, #db3f3f, var(--gold), #38d67a, var(--gold), #db3f3f);
    }

    .sweet-spot {
        position: absolute;
        left: 43%;
        width: 14%;
        top: 0;
        bottom: 0;
        border-left: 2px solid var(--white);
        border-right: 2px solid var(--white);
        background: rgba(255, 255, 255, 0.22);
    }

    .needle {
        position: absolute;
        top: -5px;
        left: 0;
        width: 5px;
        height: 28px;
        border-radius: 3px;
        background: var(--white);
        box-shadow: 0 0 14px rgba(255,255,255,0.8);
    }

    .controls {
        display: grid;
        gap: 10px;
    }

    button {
        border: 0;
        border-radius: 6px;
        min-height: 48px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 900;
        text-transform: uppercase;
        color: var(--navy);
        background: var(--gold);
        box-shadow: 0 8px 0 #a86d0d;
        transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }

    button:hover {
        filter: brightness(1.08);
    }

    button:active {
        transform: translateY(5px);
        box-shadow: 0 3px 0 #a86d0d;
    }

    button.secondary {
        color: var(--white);
        background: rgba(255,255,255,0.12);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22);
    }

    .tip {
        margin: 0;
        color: #c6dcf7;
        line-height: 1.5;
        font-size: 0.88rem;
    }

    .spark {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0;
        pointer-events: none;
    }

    @keyframes pop {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
        22% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        100% { opacity: 0; transform: translate(-50%, -90%) scale(1); }
    }

    @keyframes spark {
        0% { opacity: 1; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0); }
    }

    @media (max-width: 860px) {
        body {
            padding: 12px;
            align-items: stretch;
        }

        .game-shell {
            grid-template-columns: 1fr;
        }

        .arena {
            min-height: 500px;
        }

        .panel {
            order: -1;
        }
    }

    @media (max-width: 520px) {
        .top-bar {
            align-items: flex-start;
            flex-direction: column;
        }

        .court {
            inset: 112px 14px 16px;
        }

        .stats {
            grid-template-columns: 1fr 1fr;
        }
    }
</style>
</head>

<body>
<nav class="page-links" id="top">
    <a href="resume.html">Resume</a>
    <span>|</span>
    <a href="../index.html">Basketball Mayhem</a>
</nav>

<main class="game-shell">
    <section class="arena" aria-label="Basketball court">
        <div class="top-bar">
            <h1>Cougar Court Challenge</h1>
            <div class="badge">30 second drill</div>
        </div>

        <div class="court">
            <div class="paint"></div>
            <div class="free-throw"></div>
            <div class="backboard"></div>
            <div class="rim"></div>
            <div class="target" id="target"></div>
            <div class="ball" id="ball"></div>
        </div>

        <div class="shot-feedback" id="feedback">Splash!</div>
    </section>

    <aside class="panel">
        <div class="stats">
            <div class="stat">
                <span>Score</span>
                <strong id="score">0</strong>
            </div>
            <div class="stat">
                <span>Time</span>
                <strong id="time">30</strong>
            </div>
            <div class="stat">
                <span>Streak</span>
                <strong id="streak">0</strong>
            </div>
            <div class="stat">
                <span>Best</span>
                <strong id="best">0</strong>
            </div>
        </div>

        <div class="meter-wrap">
            <div class="meter-label">
                <span>Shot timing</span>
                <span id="accuracy">Ready</span>
            </div>
            <div class="meter" id="meter">
                <div class="sweet-spot"></div>
                <div class="needle" id="needle"></div>
            </div>
        </div>

        <div class="controls">
            <button id="shootButton">Shoot</button>
            <button class="secondary" id="resetButton">Reset</button>
        </div>

        <p class="tip">Press Shoot when the white bar hits the center. Green timing earns 3 points, close shots earn 2, and streaks make the rim glow.</p>
    </aside>
</main>

<script>
    const ball = document.getElementById("ball");
    const target = document.getElementById("target");
    const feedback = document.getElementById("feedback");
    const needle = document.getElementById("needle");
    const meter = document.getElementById("meter");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const streakEl = document.getElementById("streak");
    const bestEl = document.getElementById("best");
    const accuracyEl = document.getElementById("accuracy");
    const shootButton = document.getElementById("shootButton");
    const resetButton = document.getElementById("resetButton");

    let score = 0;
    let streak = 0;
    let best = Number(localStorage.getItem("cougarCourtBest")) || 0;
    let time = 30;
    let playing = false;
    let shotLocked = false;
    let meterPosition = 0;
    let meterDirection = 1;
    let meterSpeed = 1.7;
    let targetDirection = 1;
    let targetPosition = 50;
    let timer;

    bestEl.textContent = best;

    function startGame() {
        if (playing) return;
        playing = true;
        timer = setInterval(() => {
            time--;
            timeEl.textContent = time;
            if (time <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        playing = false;
        clearInterval(timer);
        shootButton.textContent = "Play Again";
        accuracyEl.textContent = "Buzzer";
        if (score > best) {
            best = score;
            localStorage.setItem("cougarCourtBest", best);
            bestEl.textContent = best;
        }
    }

    function resetGame() {
        clearInterval(timer);
        score = 0;
        streak = 0;
        time = 30;
        playing = false;
        shotLocked = false;
        meterSpeed = 1.7;
        scoreEl.textContent = score;
        streakEl.textContent = streak;
        timeEl.textContent = time;
        accuracyEl.textContent = "Ready";
        shootButton.textContent = "Shoot";
        ball.style.left = "50%";
        ball.style.bottom = "36px";
        ball.style.transform = "translateX(-50%) rotate(0deg)";
    }

    function animate() {
        meterPosition += meterDirection * meterSpeed;
        if (meterPosition >= 100 || meterPosition <= 0) {
            meterDirection *= -1;
            meterPosition = Math.max(0, Math.min(100, meterPosition));
        }
        needle.style.left = `calc(${meterPosition}% - 2px)`;

        targetPosition += targetDirection * 0.18;
        if (targetPosition >= 61 || targetPosition <= 39) targetDirection *= -1;
        target.style.left = `${targetPosition}%`;

        requestAnimationFrame(animate);
    }

    function shoot() {
        if (!playing && time <= 0) {
            resetGame();
            startGame();
        } else {
            startGame();
        }

        if (shotLocked || !playing) return;
        shotLocked = true;

        const distance = Math.abs(meterPosition - 50);
        const perfect = distance <= 7;
        const good = distance <= 17;
        const points = perfect ? 3 : good ? 2 : 0;
        const finalLeft = good ? targetPosition : targetPosition + (meterPosition < 50 ? -13 : 13);

        ball.style.left = `${finalLeft}%`;
        ball.style.bottom = "365px";
        ball.style.transform = "translateX(-50%) rotate(420deg) scale(0.82)";

        setTimeout(() => {
            if (points > 0) {
                score += points;
                streak++;
                meterSpeed = Math.min(3.2, meterSpeed + 0.08);
                showFeedback(perfect ? "Splash!" : "+2");
                burst();
            } else {
                streak = 0;
                showFeedback("Rimmed out");
            }

            scoreEl.textContent = score;
            streakEl.textContent = streak;
            accuracyEl.textContent = perfect ? "Perfect" : good ? "Good" : "Late";

            ball.style.left = "50%";
            ball.style.bottom = "36px";
            ball.style.transform = "translateX(-50%) rotate(0deg)";

            setTimeout(() => {
                shotLocked = false;
            }, 260);
        }, 590);
    }

    function showFeedback(text) {
        feedback.textContent = text;
        feedback.classList.remove("show");
        void feedback.offsetWidth;
        feedback.classList.add("show");
    }

    function burst() {
        const court = document.querySelector(".court");
        for (let i = 0; i < 14; i++) {
            const spark = document.createElement("span");
            spark.className = "spark";
            spark.style.left = `${targetPosition}%`;
            spark.style.top = "70px";
            spark.style.setProperty("--x", `${Math.cos(i) * 95}px`);
            spark.style.setProperty("--y", `${Math.sin(i) * 70}px`);
            spark.style.animation = "spark 620ms ease-out forwards";
            court.appendChild(spark);
            setTimeout(() => spark.remove(), 650);
        }
    }

    shootButton.addEventListener("click", shoot);
    resetButton.addEventListener("click", resetGame);
    window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
            event.preventDefault();
            shoot();
        }
    });

    animate();
</script>
</body>
</html>
